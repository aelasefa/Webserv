# Webserv Configuration File
# This is an example configuration file for the webserv project

server {
    listen 8080;
    host 127.0.0.1;
    server_name localhost;

    root ./www;
    index index.html;

    client_max_body_size 10M;

    error_page 404 /404.html;
    error_page 500 /50x.html;

    location / {
        methods GET POST;
        autoindex off;
    }

    location /uploads {
        methods GET POST DELETE;
        upload_dir ./www/uploads;
        autoindex on;
    }

    location /cgi-bin {
        methods GET POST;
        cgi_extension .php .py;
        cgi_path /usr/bin/php /usr/bin/python3;
    }

    location /redirect {
        return 301 https://www.42.fr;
    }
}

server {
    listen 8081;
    host 127.0.0.1;
    server_name example.local;

    root ./www;
    index index.html;

    location / {
        methods GET;
        autoindex on;
    }
}
