server {
    listen      8080;
    server_name localhost;

    root        www;
    index       index.html;

    client_max_body_size 1000000;

        upload_enable on;
    upload_path   www/uploads;

    error_page 400 error_pages/400.html;
    error_page 401 error_pages/401.html;
    error_page 403 error_pages/403.html;
    error_page 404 error_pages/404.html;
    error_page 405 error_pages/405.html;
    error_page 408 error_pages/408.html;
    error_page 409 error_pages/409.html;
    error_page 411 error_pages/411.html;
    error_page 413 error_pages/413.html;
    error_page 500 error_pages/500.html;
    error_page 501 error_pages/501.html;
    error_page 502 error_pages/502.html;
    error_page 504 error_pages/504.html;
    error_page 505 error_pages/505.html;

    # Home page + frontend assets
    location / {
        allow_methods GET POST DELETE;
        index         index.html;
        autoindex     off;
    }

    # Static assets used by the redesign
    location /assets {
        allow_methods GET;
        root          www/assets;
        autoindex     off;
    }

    # Protocol console page
    location /test.html {
        allow_methods GET POST DELETE;
    }

    # CGI scripts
    location /cgi-bin {
        allow_methods GET POST DELETE;
        root          www/cgi-bin;
        index         echo.py;

        cgi_ext       .py .sh .php;
        cgi_path      /usr/bin/python3 /bin/bash /usr/bin/php-cgi;
    }

    # Upload area
    location /uploads {
        allow_methods GET POST DELETE;

        root          www/uploads;
        upload_store  www/uploads;

        autoindex     on;
    }

    # Directory listing demo
    location /files {
        allow_methods GET;
        root          www;
        autoindex     on;
    }

    # 403 demo
    location /private {
        allow_methods GET;
        root          www/private;
        autoindex     off;
    }

    # Redirect demo
    location /old {
        allow_methods GET;
        return        /;
    }
}

# Secondary server
server {
    listen      8081;
    server_name localhost;

    root        www;
    index       index.html;

    client_max_body_size 1000000;

    location / {
        allow_methods GET;
        autoindex     off;
        index         index.html;
    }
}