# ===========================================
# Test Config — Covers ALL routing cases
# ===========================================

# ===========================================
# Server 1: Complete test server on port 8080
# ===========================================
server {
    listen 8080;
    host 127.0.0.1;
    server_name localhost;
    root www;
    index index.html;
    client_max_body_size 1048570;
    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/50x.html;
    error_page 405 /errors/405.html;
    error_page 413 /errors/413.html;

    # ---- Static route: root directory ----
    location / {
        root www/public;
        index index.html;
        allow_methods GET;
        autoindex off;
    }

    # ---- Static route: images with directory listing ----
    location /images {
        root www/static;
        allow_methods GET;
        autoindex on;
    }

    # ---- Static route: exact match redirect ----
    location = /old-page {
        return 301 /new-page;
    }

    # ---- Static route: another redirect ----
    location /deprecated {
        return 302 /;
    }

    # ---- CGI route: Python scripts ----
    location /cgi-bin {
        root ./cgi;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
        allow_methods GET POST;
    }

    location /cgi-bin {
        root ./cgi;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
        allow_methods GET POST;
    }
    location /cgi-bin {
        root ./cgi;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
        allow_methods GET POST;
    }
    location /cgi-bin {
        root ./cgi;
        cgi_path /usr/bin/python3;
        cgi_ext .py;
        allow_methods GET POST;
    }

    # ---- CGI route: Multiple interpreters + extensions ----
    location /scripts {
        root ./scripts;
        cgi_path /usr/bin/python3 /bin/bash /usr/bin/php;
        cgi_ext .py .sh .php;
        allow_methods GET POST DELETE;
    }

    # ---- Static route with alias ----
    location /assets {
        alias www/static/images;
        allow_methods GET;
    }

    # ---- Regex location: PHP files ----
    location ~ \.php$ {
        root www/php;
        cgi_path /usr/bin/php;
        cgi_ext .php;
        allow_methods GET POST;
    }

    # ---- Restricted: only GET ----
    location /read-only {
        root www/data;
        allow_methods GET;
        index readme.txt;
    }

    # ---- Restricted: POST only ----
    location /submit {
        root www/data;
        allow_methods POST;
        client_max_body_size 51200;
    }

    # ---- DELETE allowed ----
    location /uploads {
        root www/uploads;
        allow_methods GET POST DELETE;
        autoindex on;
    }
}

# ===========================================
# Server 2: Redirect all traffic
# ===========================================
server {
    listen 8081;
    host 127.0.0.1;
    server_name redirect.localhost;
    root www/redirect;

    location / {
        return 301 http://localhost:8080/;
    }
}

# ===========================================
# Server 3: Minimal server (test defaults)
# ===========================================
server {
    listen 9090;
    host 0.0.0.0;
    server_name minimal.com;
    root www/minimal;

    location / {
        allow_methods GET;
    }
}