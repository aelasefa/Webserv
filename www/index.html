<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Webserv</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .info {
            background: rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .info h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .info ul {
            list-style: none;
            text-align: left;
        }
        .info li {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .info li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to Webserv</h1>
        <p>Your C++98 HTTP Server is running successfully!</p>
        <div class="info">
            <h2>Server Information</h2>
            <ul>
                <li>✅ HTTP/1.1 Compatible</li>
                <li>✅ Static File Serving</li>
                <li>✅ CGI Support</li>
                <li>✅ Multiple Virtual Servers</li>
                <li>✅ File Uploads</li>
            </ul>
        </div>
    </div>
</body>
</html>
