<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>505 HTTP Version Not Supported</title>
<style>
  :root {
    --bg: #030712;
    --card-bg: rgba(17, 24, 39, 0.6);
    --card-border: rgba(255, 255, 255, 0.08);
    --text-main: #f9fafb;
    --text-muted: #9ca3af;
    --accent1: #3b82f6; /* Blue */
    --accent2: #8b5cf6; /* Violet */
    --accent3: #ec4899; /* Pink */
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background-color: var(--bg);
    color: var(--text-main);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated Background Aurora Elements */
  .aurora-container {
    position: absolute;
    width: 100vw;
    height: 100vh;
    top: 0;
    left: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  .blob {
    position: absolute;
    filter: blur(80px);
    opacity: 0.4;
    border-radius: 50%;
    animation: float 20s infinite ease-in-out alternate;
  }

  .blob-1 {
    width: 400px;
    height: 400px;
    background: var(--accent1);
    top: -100px;
    left: -100px;
    animation-delay: 0s;
  }

  .blob-2 {
    width: 500px;
    height: 500px;
    background: var(--accent2);
    bottom: -200px;
    right: -100px;
    animation-delay: -5s;
  }

  .blob-3 {
    width: 300px;
    height: 300px;
    background: var(--accent3);
    top: 30%;
    left: 40%;
    animation-delay: -10s;
  }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(100px, 50px) scale(1.1); }
    100% { transform: translate(-50px, 100px) scale(0.9); }
  }

  /* Glassmorphic Card */
  .card {
    position: relative;
    z-index: 1;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 3rem 4rem;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transform: translateY(40px);
    opacity: 0;
    max-width: 90%;
  }

  @keyframes slideUp {
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* Typography */
  .code {
    font-size: clamp(5rem, 12vw, 9rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.05em;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--text-main) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% 200%;
    animation: gradientShift 5s ease infinite;
    filter: drop-shadow(0px 4px 20px rgba(139, 92, 246, 0.3));
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .message {
    font-size: clamp(1.2rem, 3vw, 1.75rem);
    font-weight: 600;
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2.5rem;
  }

  .footer-text {
    margin-top: 3rem;
    font-size: 0.8rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    opacity: 0.7;
  }

  /* Interactive Button */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.875rem 2rem;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-main);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 9999px;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: -1;
  }

  .btn:hover {
    transform: translateY(-2px);
    border-color: transparent;
    box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
  }

  .btn:hover::before {
    opacity: 1;
  }
  
  .btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>
  <div class="aurora-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">
    <div class="code">505</div>
    <div class="message">HTTP Version Not Supported</div>
    <a href="/" class="btn">Return Home</a>
    <div class="footer-text">custom error page &middot; served by webserv</div>
  </div>
</body>
</html>
